apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
        - name: chatbot
          image: new-project-chatbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: LLM_PROVIDER
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: OPENAI_MODEL
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: OPENAI_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: OLLAMA_BASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot
  namespace: banking-app
spec:
  selector:
    app: chatbot
  ports:
    - port: 8000
      targetPort: 8000
