apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: new-project-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              value: postgresql://banking_user:banking_password@database:5432/banking_app
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: CORS_ORIGIN
            - name: CHATBOT_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: CHATBOT_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: banking-app
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
