services:
  database:
    image: postgres:16-alpine
    container_name: banking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking_app
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: banking-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://banking_user:banking_password@database:5432/banking_app
      JWT_SECRET: super-secret-jwt-key-change-me
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: banking-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
