services:
  database:
    image: postgres:16-alpine
    container_name: banking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking_app
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: banking-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://banking_user:banking_password@database:5432/banking_app
      JWT_SECRET: super-secret-jwt-key-change-me
      CORS_ORIGIN: http://localhost:5173
      CHATBOT_URL: http://chatbot:8000
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
      chatbot:
        condition: service_started

  chatbot:
    build:
      context: ./chatbot
    container_name: banking-chatbot
    restart: unless-stopped
    environment:
      LLM_PROVIDER: none
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_BASE_URL: https://api.openai.com/v1
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama:latest
    container_name: banking-ollama
    restart: unless-stopped
    profiles: ["llm-local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: ./frontend
    container_name: banking-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
